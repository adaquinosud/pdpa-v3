# render.yaml — Blueprint (Infrastructure as Code) do PDPA v3 no Render.
# CP-deploy-4. Junta: imagem Docker (Dockerfile, deploy-3), entrypoint gunicorn
# (deploy-2), migration no deploy (#7) e Cron da noturna (#10).
#
# SEGREDOS: este arquivo declara QUE as variáveis existem, NUNCA os valores. As
# marcadas `sync: false` o Alexandre seta no painel do Render (Dashboard → o
# serviço/Env Group → Environment). Nada de valor de secret versionado.
#
# Render mudou `env:` → `runtime:` no schema do blueprint; aqui uso `runtime`.
# Planos/região/horário JÁ definidos (chore/render-yaml-valores): region=virginia
# (US East, mais perto do BR), Postgres basic-256mb, web/cron standard (2GB),
# cron 06:00 UTC = 03:00 BRT. Ajustar o tier do Postgres se o piloto crescer.

# ── Postgres gerenciado (IaC: declarado aqui, é o mais limpo — fonte única) ──
databases:
  - name: pdpa-db
    databaseName: pdpa
    user: pdpa
    plan: basic-256mb        # menor tier Basic (256MB RAM); storage à parte ~$0.30/GB/mês
    region: virginia         # US East — mais perto do Brasil; banco+web+cron na MESMA região

# ── Env compartilhado entre web e crons (secrets + config) ──────────────────
# fromGroup evita repetir as chaves em cada serviço. DATABASE_URL fica por-serviço
# (fromDatabase), pois referencia o banco acima.
envVarGroups:
  - name: pdpa-config
    envVars:
      - key: FLASK_ENV
        value: production    # não-secret: liga ProductionConfig + boot-check do SECRET_KEY
      - key: FLASK_SECRET_KEY
        sync: false          # SECRET — assina a sessão; boot-check falha sem ela em prod
      - key: ANTHROPIC_API_KEY
        sync: false          # SECRET — credencial DEDICADA (isolar do v2)
      - key: OPENAI_API_KEY
        sync: false          # SECRET — embeddings
      - key: APIFY_TOKEN
        sync: false          # SECRET — coleta
      - key: FERNET_KEY
        sync: false          # SECRET — cifra credenciais de fonte no banco
      - key: CORS_ORIGINS
        sync: false          # CSV de origens cross-origin; vazio = sem CORS (UI é same-origin)

services:
  # ── Web Service (gunicorn via Dockerfile) ─────────────────────────────────
  - type: web
    name: pdpa-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: standard           # 2GB RAM — ML stack; Starter 512MB arrisca OOM
    region: virginia         # US East — mesma região do banco (internal URL)
    healthCheckPath: /healthz
    # startCommand OMITIDO de propósito → herda o CMD do Dockerfile (gunicorn
    # wsgi:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    # --worker-class gthread). Repetir aqui só duplicaria a fonte da verdade.
    # #7 migration 1x por deploy + gate de calibração do LLM-juiz da pesquisa
    # (CP-Pesquisa-F1.4): roda o juiz REAL contra o golden set (1 chamada Haiku);
    # BLOQUEIA o deploy só se houver FALSO-POSITIVO nos limpos (faltas = aviso). Tem
    # rede + ANTHROPIC_API_KEY (env group) aqui. CI segue mockado.
    # IMPORTANTE: o Render NÃO roda isto num shell — tokeniza por espaço e dá exec
    # direto. '&&' não funciona (vira argumento do alembic → exit 2). Por isso um
    # script único (2 tokens), onde o shell de verdade encadeia os passos.
    preDeployCommand: bash scripts/deploy_pre.sh
    envVars:
      - fromGroup: pdpa-config
      - key: DATABASE_URL
        fromDatabase:
          name: pdpa-db
          property: connectionString   # Render entrega postgresql:// → o app/alembic
                                        # normalizam p/ +psycopg (deploy-1)

  # ── Cron Job: noturna GENÉRICA (#10 · CP-noturna-toggle) ───────────────────
  # UM cron pra TODAS as empresas. `run_noturna_todas.sh` varre as empresas com
  # `coleta_noturna_ativa=TRUE` (toggle na UI) + ≥1 fonte ativa com coletor, e roda
  # run_noturna.sh por empresa em loop (incremental por-fonte, sem all-time, sem
  # interferência cruzada). Ligar/desligar cliente = toggle na tela, SEM tocar o
  # Blueprint nem criar cron novo. Default da empresa nova = OFF; Confins(4) já é
  # TRUE (migration c3f8a1d29b04). O `name` segue `pdpa-noturna-bh-airport` por
  # histórico — NÃO renomear (evita o Render recriar o serviço); o conteúdo é
  # genérico, não só BH Airport. (dockerCommand sem args → sem o problema de
  # tokenização por espaço que exigia passar o ID.)
  - type: cron
    name: pdpa-noturna-bh-airport
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: standard           # mesma imagem/ML stack que o web
    region: virginia         # US East — mesma região do banco (internal URL)
    schedule: "0 6 * * *"    # 06:00 UTC = 03:00 BRT (UTC-3, sem horário de verão). Render usa UTC.
    dockerCommand: bash scripts/run_noturna_todas.sh
    envVars:
      - fromGroup: pdpa-config           # precisa do FLASK_SECRET_KEY tb: gen_relatorio
                                         # chama create_app() (boot-check) em produção
      - key: DATABASE_URL
        fromDatabase:
          name: pdpa-db
          property: connectionString
