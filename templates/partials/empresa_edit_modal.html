<div id="empresa-edit-modal" class="fixed inset-0 z-50 bg-loyall-900/40 flex items-center justify-center"
     hx-on:click="if(event.target===this) this.remove()">
  <div class="bg-white rounded-lg shadow-xl w-full max-w-lg p-6"
       hx-on:click="event.stopPropagation()">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-lg font-semibold">Editar empresa</h2>
      <button onclick="document.getElementById('empresa-edit-modal').remove()"
              class="text-loyall-400 hover:text-loyall-700 text-xl leading-none">×</button>
    </div>
    <form hx-put="{{ url_for('ui.htmx_salvar_empresa', empresa_id=empresa.id) }}"
          hx-swap="none"
          hx-on::after-request="if(event.detail.successful) window.location.reload()"
          class="space-y-3 text-sm">
      <div>
        <label class="block text-loyall-700 mb-1">Nome*</label>
        <input name="nome" value="{{ empresa.nome }}" required
               class="w-full px-3 py-2 border border-loyall-200 rounded">
      </div>
      <div>
        <label class="block text-loyall-700 mb-1">Setor</label>
        <input name="setor" value="{{ empresa.setor or '' }}"
               class="w-full px-3 py-2 border border-loyall-200 rounded">
      </div>
      <div>
        <label class="block text-loyall-700 mb-1">Site</label>
        <input name="site" value="{{ empresa.site or '' }}" type="url"
               class="w-full px-3 py-2 border border-loyall-200 rounded">
      </div>
      <div>
        <label class="block text-loyall-700 mb-1">Observação</label>
        <textarea name="observacao" rows="3"
                  class="w-full px-3 py-2 border border-loyall-200 rounded">{{ empresa.observacao or '' }}</textarea>
      </div>
      <div class="flex gap-2 pt-2">
        <button type="submit" class="px-4 py-2 bg-loyall-700 hover:bg-loyall-600 text-loyall-50 rounded">Salvar</button>
        <button type="button" onclick="document.getElementById('empresa-edit-modal').remove()"
                class="px-4 py-2 border border-loyall-200 hover:bg-loyall-100 rounded">Cancelar</button>
      </div>
    </form>
  </div>
</div>
