<div id="empresa-edit-modal" class="fixed inset-0 z-50 bg-loyall-900/40 flex items-center justify-center"
     hx-on:click="if(event.target===this) this.remove()">
  <div class="bg-white rounded-lg shadow-xl w-full max-w-lg p-6"
       hx-on:click="event.stopPropagation()">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-lg font-semibold">Editar empresa</h2>
      <button onclick="document.getElementById('empresa-edit-modal').remove()"
              class="text-loyall-400 hover:text-loyall-700 text-xl leading-none">×</button>
    </div>
    <form hx-put="{{ url_for('ui.htmx_salvar_empresa', empresa_id=empresa.id) }}"
          hx-swap="none"
          hx-on::after-request="if(event.detail.successful) window.location.reload()"
          class="space-y-3 text-sm">
      <div>
        <label class="block text-loyall-700 mb-1">Nome*</label>
        <input name="nome" value="{{ empresa.nome }}" required
               class="w-full px-3 py-2 border border-loyall-200 rounded">
      </div>
      <div>
        <label class="block text-loyall-700 mb-1">Setor</label>
        <input name="setor" value="{{ empresa.setor or '' }}"
               class="w-full px-3 py-2 border border-loyall-200 rounded">
      </div>
      <div>
        <label class="block text-loyall-700 mb-1">Site</label>
        <input name="site" value="{{ empresa.site or '' }}" type="url"
               class="w-full px-3 py-2 border border-loyall-200 rounded">
      </div>
      <div>
        <label class="block text-loyall-700 mb-1">Observação</label>
        <textarea name="observacao" rows="3"
                  class="w-full px-3 py-2 border border-loyall-200 rounded">{{ empresa.observacao or '' }}</textarea>
      </div>
      {# ORIGEM (fatia 1): essência declarada (texto livre). A régua de profundidade
         do confronto mede os gaps contra isto. #}
      <div class="pt-2 border-t border-loyall-100">
        <label class="block text-loyall-700 mb-1">Missão, visão e valores
          <span class="text-xs text-loyall-400">(usados pela leitura de profundidade do confronto — ORIGEM)</span>
        </label>
        <textarea name="missao" rows="2" placeholder="Missão"
                  class="w-full px-3 py-2 border border-loyall-200 rounded mb-2">{{ empresa.missao or '' }}</textarea>
        <textarea name="visao" rows="2" placeholder="Visão"
                  class="w-full px-3 py-2 border border-loyall-200 rounded mb-2">{{ empresa.visao or '' }}</textarea>
        <textarea name="valores" rows="2" placeholder="Valores"
                  class="w-full px-3 py-2 border border-loyall-200 rounded">{{ empresa.valores or '' }}</textarea>
      </div>
      {# CP-impacto-rs: taxas de sucesso por prioridade (fluxo R$ = recuperados ×
         LTV; recuperados = detratores × taxa[prioridade]). Editável por empresa. #}
      <div class="pt-2 border-t border-loyall-100">
        <label class="block text-loyall-700 mb-1">Taxa de sucesso por prioridade da ação
          <span class="text-xs text-loyall-400">(0–1; usada no R$ recuperável do Plano)</span>
        </label>
        <div class="grid grid-cols-3 gap-2">
          <label class="text-xs text-loyall-500">alta
            <input name="taxa_alto" type="number" step="0.01" min="0" max="1"
                   value="{{ empresa.taxa_alto if empresa.taxa_alto is not none else 0.50 }}"
                   class="w-full px-2 py-1 border border-loyall-200 rounded">
          </label>
          <label class="text-xs text-loyall-500">média
            <input name="taxa_medio" type="number" step="0.01" min="0" max="1"
                   value="{{ empresa.taxa_medio if empresa.taxa_medio is not none else 0.35 }}"
                   class="w-full px-2 py-1 border border-loyall-200 rounded">
          </label>
          <label class="text-xs text-loyall-500">baixa
            <input name="taxa_baixo" type="number" step="0.01" min="0" max="1"
                   value="{{ empresa.taxa_baixo if empresa.taxa_baixo is not none else 0.20 }}"
                   class="w-full px-2 py-1 border border-loyall-200 rounded">
          </label>
        </div>
      </div>
      <div class="flex gap-2 pt-2">
        <button type="submit" class="px-4 py-2 bg-loyall-700 hover:bg-loyall-600 text-loyall-50 rounded">Salvar</button>
        <button type="button" onclick="document.getElementById('empresa-edit-modal').remove()"
                class="px-4 py-2 border border-loyall-200 hover:bg-loyall-100 rounded">Cancelar</button>
      </div>
    </form>
  </div>
</div>
