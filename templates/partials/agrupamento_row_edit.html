<tr id="ag-{{ a.id }}" class="border-t border-loyall-100 bg-amber-50">
  <td colspan="4" class="py-2 px-2">
    <form hx-put="{{ url_for('ui.htmx_salvar_agrupamento', agrupamento_id=a.id) }}"
          hx-target="#ag-{{ a.id }}" hx-swap="outerHTML"
          class="flex items-center gap-2 text-sm">
      <input name="nome" value="{{ a.nome }}" required autofocus
             class="px-2 py-1 border border-loyall-300 rounded flex-1 max-w-xs"
             hx-trigger="keyup[key=='Escape'] from:body"
             hx-get="{{ url_for('ui.htmx_agrupamento_row', agrupamento_id=a.id) }}"
             hx-target="#ag-{{ a.id }}" hx-swap="outerHTML">
      <input name="descricao" value="{{ a.descricao or '' }}" placeholder="Descrição"
             class="px-2 py-1 border border-loyall-300 rounded flex-1">
      <button type="submit" class="px-3 py-1 bg-loyall-700 hover:bg-loyall-600 text-loyall-50 rounded text-xs">salvar</button>
      <button type="button" hx-get="{{ url_for('ui.htmx_agrupamento_row', agrupamento_id=a.id) }}"
              hx-target="#ag-{{ a.id }}" hx-swap="outerHTML"
              class="px-3 py-1 border border-loyall-300 hover:bg-loyall-100 rounded text-xs">cancelar</button>
    </form>
  </td>
</tr>
