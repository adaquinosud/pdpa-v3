<tr id="fonte-{{ f.id }}" class="border-t border-loyall-100 bg-amber-50">
  <td colspan="6" class="py-2 px-2">
    <form hx-put="{{ url_for('ui.htmx_salvar_fonte', fonte_id=f.id) }}"
          hx-target="#fonte-{{ f.id }}" hx-swap="outerHTML"
          class="grid grid-cols-12 gap-2 text-sm items-center">
      <div class="col-span-2 text-loyall-700"><code class="text-xs">{{ f.conector_tipo }}</code> <span class="text-loyall-400">(não editável)</span></div>
      <input name="url" value="{{ f.url }}" required autofocus
             class="col-span-7 px-2 py-1 border border-loyall-300 rounded"
             placeholder="URL ou place_id">
      <input name="observacao" value="{{ f.observacao or '' }}"
             class="col-span-1 px-2 py-1 border border-loyall-300 rounded"
             placeholder="obs">
      <button type="submit" class="col-span-1 px-2 py-1 bg-loyall-700 hover:bg-loyall-600 text-loyall-50 rounded text-xs">salvar</button>
      <button type="button" hx-get="{{ url_for('ui.htmx_fonte_row', fonte_id=f.id) }}"
              hx-target="#fonte-{{ f.id }}" hx-swap="outerHTML"
              class="col-span-1 px-2 py-1 border border-loyall-300 hover:bg-loyall-100 rounded text-xs">cancelar</button>
    </form>
  </td>
</tr>
