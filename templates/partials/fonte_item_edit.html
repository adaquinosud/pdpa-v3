{# Modo edit da fonte item #}
<div id="fonte-{{ f.id }}" class="fonte-item flex items-center gap-2 px-2 py-2 text-xs rounded bg-amber-50 border border-amber-300">
  <form hx-put="{{ url_for('ui.htmx_salvar_fonte', fonte_id=f.id) }}"
        hx-target="#fonte-{{ f.id }}" hx-swap="outerHTML"
        class="flex items-center gap-2 w-full">
    <code class="px-1.5 py-0.5 bg-loyall-100 rounded text-loyall-800 min-w-[6rem] inline-block">{{ f.conector_tipo }}</code>
    <input name="url" value="{{ f.url }}" required autofocus
           class="flex-1 px-2 py-1 border border-loyall-300 rounded">
    <input name="observacao" value="{{ f.observacao or '' }}" placeholder="obs (opcional)"
           class="w-32 px-2 py-1 border border-loyall-300 rounded">
    {% if f.eh_ra %}
    <span class="flex items-center gap-1 text-loyall-500 border-l border-loyall-300 pl-2 whitespace-nowrap">
      janela
      <input name="ra_janela_meses" type="number" min="1" value="{{ f.ra_janela_meses or '' }}" placeholder="{{ f.ra_default_janela }}"
             class="w-12 px-1 py-0.5 border border-loyall-300 rounded">m · máx
      <input name="ra_max_casos" type="number" min="1" value="{{ f.ra_max_casos or '' }}" placeholder="{{ f.ra_default_cap }}"
             oninput="this.closest('form').querySelector('[data-ra-cost]').textContent='até US$ '+((((this.value|0)||{{ f.ra_default_cap }})*0.025).toFixed(2))"
             class="w-16 px-1 py-0.5 border border-loyall-300 rounded">
      · <span data-ra-cost class="text-loyall-700 font-medium">até US$ {{ '%.2f'|format(f.ra_custo_max) }}</span>
    </span>
    {% endif %}
    <button type="submit" class="px-3 py-1 bg-loyall-700 hover:bg-loyall-600 text-loyall-50 rounded">salvar</button>
    <button type="button"
            hx-get="{{ url_for('ui.htmx_fonte_row', fonte_id=f.id) }}"
            hx-target="#fonte-{{ f.id }}" hx-swap="outerHTML"
            class="px-3 py-1 border border-loyall-300 hover:bg-loyall-100 rounded">cancelar</button>
  </form>
</div>
