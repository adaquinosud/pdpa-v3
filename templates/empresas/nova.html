{% extends "base.html" %}
{% block titulo %}Nova empresa{% endblock %}
{% block conteudo %}
<div class="mb-4">
  <a href="{{ url_for('ui.lista_empresas') }}" class="text-sm text-loyall-400 hover:underline">← Empresas</a>
  <h1 class="text-2xl font-semibold mt-1">Nova empresa</h1>
</div>

<form method="post" class="bg-white border border-loyall-200 rounded p-6 max-w-lg space-y-4">
  <div>
    <label class="block text-sm font-medium text-loyall-700 mb-1">Nome*</label>
    <input name="nome" required class="w-full px-3 py-2 border border-loyall-200 rounded">
  </div>
  <div>
    <label class="block text-sm font-medium text-loyall-700 mb-1">Setor</label>
    <input name="setor" placeholder="ex: aeroporto, restaurante, locadora..." class="w-full px-3 py-2 border border-loyall-200 rounded">
  </div>
  <div>
    <label class="block text-sm font-medium text-loyall-700 mb-1">Site</label>
    <input name="site" type="url" placeholder="https://..." class="w-full px-3 py-2 border border-loyall-200 rounded">
  </div>
  <div class="flex gap-2">
    <button type="submit" class="px-4 py-2 bg-loyall-700 hover:bg-loyall-600 text-loyall-50 rounded">Criar</button>
    <a href="{{ url_for('ui.lista_empresas') }}" class="px-4 py-2 border border-loyall-200 rounded text-loyall-700">Cancelar</a>
  </div>
</form>
{% endblock %}
