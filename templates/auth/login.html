<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entrar — PDPA Loyall</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter','system-ui'] }, colors: { loyall: { 50:'#f4f6f8',100:'#e6eaf0',200:'#c9d2dd',400:'#7187a0',600:'#395672',700:'#2a4360',800:'#1d3149',900:'#13223a' } } } } }
  </script>
  <style>body { font-family: 'Inter', system-ui; }</style>
</head>
<body class="min-h-screen bg-loyall-50 flex items-center justify-center">
  <div class="w-full max-w-sm bg-white rounded-lg shadow p-8">
    <div class="flex items-center gap-2 mb-6">
      <span class="inline-flex items-center justify-center w-10 h-10 rounded bg-loyall-700 text-loyall-50 text-lg font-bold">L</span>
      <div>
        <div class="font-semibold text-loyall-900">PDPA</div>
        <div class="text-xs text-loyall-400">Loyall</div>
      </div>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="mb-3 px-3 py-2 rounded {% if cat == 'erro' %}bg-red-100 text-red-800{% else %}bg-emerald-100 text-emerald-800{% endif %} text-sm">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="post" class="space-y-4">
      <div>
        <label for="email" class="block text-sm font-medium text-loyall-700 mb-1">Email</label>
        <input id="email" name="email" type="email" required autofocus
               value="{{ email or '' }}"
               class="w-full px-3 py-2 border border-loyall-200 rounded focus:outline-none focus:ring-2 focus:ring-loyall-600">
      </div>
      <div>
        <label for="senha" class="block text-sm font-medium text-loyall-700 mb-1">Senha</label>
        <input id="senha" name="senha" type="password" required
               class="w-full px-3 py-2 border border-loyall-200 rounded focus:outline-none focus:ring-2 focus:ring-loyall-600">
      </div>
      <button type="submit" class="w-full bg-loyall-700 hover:bg-loyall-600 text-loyall-50 py-2 rounded font-medium">Entrar</button>
    </form>
  </div>
</body>
</html>
