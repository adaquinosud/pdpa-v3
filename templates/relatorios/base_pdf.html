<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>{% block title %}Relatório PDPA{% endblock %}</title>
<style>
  @page { size: A4; margin: 18mm 16mm 18mm 16mm; }
  body { font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; color: #1d3149; font-size: 10pt; line-height: 1.4; }
  h1 { font-size: 18pt; color: #1d3149; margin: 0 0 4pt; font-weight: 700; }
  h2 { font-size: 13pt; color: #1d3149; margin: 14pt 0 4pt; border-bottom: 1px solid #d9dde4; padding-bottom: 3pt; }
  h3 { font-size: 11pt; color: #4b6079; margin: 10pt 0 3pt; }
  p  { margin: 0 0 5pt; }
  .sub { color: #7a8aa0; font-size: 9pt; }
  .meta { color: #7a8aa0; font-size: 8.5pt; margin-bottom: 8pt; }
  table { width: 100%; border-collapse: collapse; font-size: 9pt; }
  th, td { border-bottom: 1px solid #e8eaef; padding: 4pt 6pt; text-align: left; vertical-align: top; }
  th { color: #4b6079; font-weight: 600; background: #f7f8fb; }
  .badge { display: inline-block; padding: 1pt 6pt; border-radius: 3pt; font-size: 8pt; font-weight: 600; }
  .b-critico { background: #fbe2e2; color: #8a1f1f; }
  .b-fraco   { background: #fde4cf; color: #8a4a1f; }
  .b-atencao { background: #fdedc4; color: #7a5820; }
  .b-bom     { background: #d9efd1; color: #2e5c24; }
  .b-excelente { background: #b9e3ab; color: #1f4d18; }
  .card { border: 1px solid #d9dde4; border-radius: 4pt; padding: 6pt 8pt; margin-bottom: 5pt; }
  .card.estrut { border-color: #b89355; background: #fcf6e8; }
  .muted { color: #7a8aa0; }
  footer { position: running(footer); color: #7a8aa0; font-size: 8pt; text-align: center; }
  @page { @bottom-center { content: element(footer); } }
</style>
</head>
<body>
<header>
  <div class="meta">{{ empresa.nome }}{% if escopo_label %} · {{ escopo_label }}{% endif %} · gerado em {{ gerado_em.strftime('%d/%m/%Y') }} · janela últimos 180 dias</div>
</header>
{% block conteudo %}{% endblock %}
<footer>PDPA · Loyall — {{ empresa.nome }}</footer>
</body>
</html>
