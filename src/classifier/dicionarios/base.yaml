# ─── Categorias auxiliares (NÃO são subpilares) ────────────────────────
#
# Indicadores genéricos sem ancoragem específica. Quando o verbatim
# contém SOMENTE expressões destas listas (sem outros substantivos que
# ancorem ao produto/serviço/empresa/atendimento), classifique como:
#   - conversivel no subpilar mais provável pela fonte (Pa1 padrão em
#     redes sociais)
#   - OU sem_lastro/inativo se for tão vago que nem o subpilar é inferível.
#
# Estas listas crescem conforme novas expressões aparecem nos verbatins
# coletados.

