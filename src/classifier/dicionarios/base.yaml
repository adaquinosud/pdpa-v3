# Dicionário base — expressões genéricas por subpilar/tipo.
# Aplicáveis a qualquer setor. Combinado com setor_<setor>.yaml em runtime
# por src/classifier/dicionarios/__init__.py:carregar_dicionario().
#
# Fonte: refatoração do framework PDPA v2 para versão setor-agnóstica +
# amostragem de verbatins certos da auditoria de 2026-05-18.
#
# Política: 5-8 expressões por (subpilar, tipo). Genéricas — específicas
# de setor vão para setor_X.yaml.

P1:
  promotor:
    - "promessa cumprida"
    - "conforme anunciado"
    - "como prometido"
    - "sem surpresas"
    - "entregou o que prometeu"
    - "preço justo conforme anúncio"
  detrator:
    - "propaganda enganosa"
    - "anúncio enganoso"
    - "prazo descumprido"
    - "preço diferente do anunciado"
    - "letra miúda"
    - "cobrança a maior do prometido"
    - "promessa não cumprida"

P2:
  promotor:
    - "bom produto"
    - "boa qualidade"
    - "qualidade do produto"
    - "rendimento bom"
    - "satisfeito com a qualidade"
    - "vale o preço"
    - "produto sem defeitos"
  detrator:
    - "defeito"
    - "produto estragado"
    - "péssima qualidade"
    - "veio errado"
    - "chegou estragado"
    - "qualidade ruim"
    - "produto sem sabor"
    - "rendimento abaixo do esperado"

P3:
  promotor:
    - "sempre igual"
    - "nunca falhou"
    - "consistente"
    - "padrão em todas as visitas"
    - "confiável ao longo do tempo"
  detrator:
    - "inconsistente"
    - "cada vez diferente"
    - "antes era melhor"
    - "variação entre lojas"
    - "qualidade variável"
    - "cada filial é uma realidade"

